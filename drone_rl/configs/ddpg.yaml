# DDPG-specific config overrides
algorithm: ddpg
log_dir: runs/ddpg
total_timesteps: 1000000
num_envs: 1

ddpg:
  lr_actor: 0.0001
  lr_critic: 0.001
  gamma: 0.99
  tau: 0.005
  buffer_size: 100000
  batch_size: 256
  learning_starts: 1000
  train_freq: 1
  gradient_steps: 1
  steps_per_iteration: 1000
  noise_start: 0.2
  noise_end: 0.05
  max_grad_norm: 1.0
  normalize_obs: true
  hidden_dims: [256, 256]
