# ============================================================================
# Default Configuration — Drone RL Framework
# ============================================================================

# Algorithm selection: ppo, sac, dqn
algorithm: ppo

# ----- Device & Training -----
device: auto           # auto, cuda, cpu
seed: 42
use_amp: true          # Mixed precision training
total_timesteps: 1000000
num_envs: 4            # Parallel environments (PPO)
use_subproc: false     # Use multiprocessing for vec envs

# ----- Logging -----
log_dir: runs/default
log_interval: 10       # Print every N iterations
eval_interval: 50000   # Evaluate every N timesteps
eval_episodes: 10
checkpoint_interval: 100000
auto_resume: true

# ----- Environment -----
env:
  obs_mode: state      # state, image, combined
  reward_mode: report  # report, shaped
  corridor_width: 3.0
  corridor_length: 10.0
  wind_enabled: false
  wind_sigma: 0.3
  obstacle_density: 1.0
  sensor_noise: 0.0
  max_steps: 1500

# ----- Reward Shaping -----
reward:
  # Report reward: r_distance + r_goal + r_time + r_timeout + r_collision
  forward_progress: 1.0
  distance_scale: 100.0
  goal_reached: 10.0
  collision: -10.0
  timeout_penalty: -10.0
  time_penalty: -0.001

  # Only used when reward_mode=shaped
  centering: 0.5
  smoothness: 0.1       # λ for ||a_t - a_{t-1}||²
  wall_proximity: -0.5
  oscillation: -0.05
  control_jump: -0.05

# ----- Curriculum Learning -----
curriculum:
  enabled: false
  patience: 5
  stages: null           # Uses default 6-stage curriculum

# ----- PPO Hyperparameters -----
ppo:
  lr: 0.0003
  lr_end: 0.0
  n_steps: 2048
  n_epochs: 10
  batch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_obs: true
  hidden_dims: [256, 256]
  log_std_init: -0.5
  activation: tanh

  # Vision + state fusion (used when env.obs_mode is image/combined)
  image_encoder: vit     # vit, cnn
  image_feature_dim: 192
  state_hidden_dims: [128]
  vit_patch_size: 8
  vit_embed_dim: 128
  vit_depth: 4
  vit_heads: 4
  vit_dropout: 0.0

# ----- SAC Hyperparameters -----
sac:
  lr_actor: 0.0003
  lr_critic: 0.0003
  lr_alpha: 0.0003
  gamma: 0.99
  tau: 0.005
  buffer_size: 100000
  batch_size: 256
  learning_starts: 1000
  train_freq: 1
  gradient_steps: 1
  steps_per_iteration: 1000
  normalize_obs: true
  hidden_dims: [256, 256]

# ----- DDPG Hyperparameters -----
ddpg:
  lr_actor: 0.0001
  lr_critic: 0.001
  gamma: 0.99
  tau: 0.005
  buffer_size: 100000
  batch_size: 256
  learning_starts: 1000
  train_freq: 1
  gradient_steps: 1
  steps_per_iteration: 1000
  noise_start: 0.2
  noise_end: 0.05
  max_grad_norm: 1.0
  normalize_obs: true
  hidden_dims: [256, 256]

# ----- DQN Hyperparameters -----
dqn:
  lr: 0.0001
  gamma: 0.99
  buffer_size: 50000
  batch_size: 64
  learning_starts: 1000
  train_freq: 4
  target_update_freq: 500
  max_grad_norm: 10.0
  eps_start: 1.0
  eps_end: 0.05
  action_mode: semantic   # semantic (11 actions) or cartesian (27)
  n_bins: 3
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  steps_per_iteration: 1000
  normalize_obs: true
  hidden_dims: [256, 256]
