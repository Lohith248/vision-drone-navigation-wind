# DQN-specific config overrides
algorithm: dqn
log_dir: runs/dqn
total_timesteps: 500000
num_envs: 1

dqn:
  lr: 0.0001
  gamma: 0.99
  buffer_size: 50000
  batch_size: 64
  learning_starts: 1000
  train_freq: 4
  target_update_freq: 500
  max_grad_norm: 10.0
  eps_start: 1.0
  eps_end: 0.05
  action_mode: semantic
  n_bins: 3
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  steps_per_iteration: 1000
  normalize_obs: true
  hidden_dims: [256, 256]
