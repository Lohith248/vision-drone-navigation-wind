# Ablation: PPO with reward scaling reduced (distance_scale: 100 -> 1).
# Tests sensitivity of training stability to the dominant shaping term.
algorithm: ppo
log_dir: runs/abl_low_reward_scale/ppo_seed0
total_timesteps: 500000
num_envs: 4
eval_episodes: 30

env:
  obs_mode: combined
  reward_mode: report
  wind_enabled: false
  obstacle_density: 1.0
  max_steps: 1500

curriculum:
  enabled: true
  patience: 3
  stages:
    - {name: 1_wide_straight,    corridor_width: 3.0, obstacle_density: 0.0, reward_threshold: -40.0, success_threshold: 0.05}
    - {name: 2_narrow_corridor,  corridor_width: 2.6, obstacle_density: 0.0, reward_threshold: -25.0, success_threshold: 0.10}
    - {name: 3_with_obstacles,   corridor_width: 2.5, obstacle_density: 0.7, reward_threshold: -15.0, success_threshold: 0.20}
    - {name: 4_moving_obstacles, corridor_width: 2.5, obstacle_density: 1.0, enable_moving_obstacles: true, reward_threshold: -8.0, success_threshold: 0.30}
    - {name: 5_wind_intro,       corridor_width: 2.0, obstacle_density: 1.0, enable_moving_obstacles: true, sensor_noise: 0.05, wind_enabled: true, wind_sigma: 0.25, reward_threshold: -2.0, success_threshold: 0.40}
    - {name: 6_full_wind,        corridor_width: 2.0, obstacle_density: 1.0, enable_moving_obstacles: true, sensor_noise: 0.05, wind_enabled: true, wind_sigma: 0.5,  reward_threshold:  2.0, success_threshold: 0.55}

reward:
  forward_progress: 1.0
  distance_scale: 1.0          # <-- THE KNOB (was 100.0)
  goal_reached: 30.0
  collision: -50.0
  timeout_penalty: -20.0
  time_penalty: -0.002

ppo:
  lr: 0.0001
  lr_end: 0.00001
  n_steps: 2048
  n_epochs: 10
  batch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_obs: true
  normalize_advantages: true
  hidden_dims: [256, 256]
  activation: tanh
  image_encoder: vit
  image_feature_dim: 192
  state_hidden_dims: [128]
  vit_patch_size: 8
  vit_embed_dim: 128
  vit_depth: 4
  vit_heads: 4
  vit_dropout: 0.0
