# Ablation: PPO with curriculum disabled — train direct on full-difficulty env.
algorithm: ppo
log_dir: runs/abl_no_curriculum/ppo_seed0
total_timesteps: 500000
num_envs: 4
eval_episodes: 30

env:
  obs_mode: combined
  reward_mode: report
  corridor_width: 2.0
  obstacle_density: 1.0
  wind_enabled: true
  wind_sigma: 0.5
  sensor_noise: 0.05
  max_steps: 1500

curriculum:
  enabled: false

reward:
  forward_progress: 1.0
  distance_scale: 100.0
  goal_reached: 30.0
  collision: -50.0
  timeout_penalty: -20.0
  time_penalty: -0.002

ppo:
  lr: 0.0001
  lr_end: 0.00001
  n_steps: 2048
  n_epochs: 10
  batch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_obs: true
  normalize_advantages: true
  hidden_dims: [256, 256]
  activation: tanh
  image_encoder: vit
  image_feature_dim: 192
  state_hidden_dims: [128]
  vit_patch_size: 8
  vit_embed_dim: 128
  vit_depth: 4
  vit_heads: 4
  vit_dropout: 0.0
