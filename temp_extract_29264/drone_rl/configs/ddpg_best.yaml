# Strong DDPG baseline configuration
algorithm: ddpg
log_dir: runs/ddpg_best
total_timesteps: 1500000
num_envs: 1
eval_episodes: 100

env:
  obs_mode: state
  reward_mode: report
  wind_enabled: false
  obstacle_density: 1.0
  max_steps: 1500

reward:
  forward_progress: 1.0
  distance_scale: 100.0
  goal_reached: 30.0
  collision: -50.0
  timeout_penalty: -20.0
  time_penalty: -0.002

ddpg:
  lr_actor: 0.0001
  lr_critic: 0.0005
  gamma: 0.99
  tau: 0.005
  buffer_size: 200000
  batch_size: 256
  learning_starts: 5000
  train_freq: 1
  gradient_steps: 1
  steps_per_iteration: 1000
  noise_start: 0.25
  noise_end: 0.03
  max_grad_norm: 1.0
  normalize_obs: true
  hidden_dims: [256, 256]
